<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JARVIS — Voice AI</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#00d4ff;--blue-dim:#00d4ff22;--blue-mid:#00d4ff55;
      --green:#00ff88;--orange:#ff8c55;--red:#ff3b1a;
      --bg:#09090f;--bg2:#0d1b2a;--bg3:#111827;
      --border:#ffffff11;--text:#d4d4d4;--muted:#555;
    }
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Segoe UI',system-ui,sans-serif;
      background:var(--bg);color:var(--text);
      display:flex;flex-direction:column;
    }

    /* ── HEADER ── */
    header{
      background:linear-gradient(135deg,#0d1b2a,#1a1a2e);
      border-bottom:1px solid #00d4ff22;
      padding:12px 20px;
      display:flex;align-items:center;gap:14px;
      flex-shrink:0;
    }
    .logo{
      width:40px;height:40px;border-radius:50%;
      background:radial-gradient(circle,var(--blue) 0%,#0066cc 100%);
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:15px;color:#fff;
      box-shadow:0 0 16px #00d4ff55;flex-shrink:0;
    }
    .htitle{font-size:17px;color:var(--blue);letter-spacing:2px;font-weight:700}
    .hsub{font-size:10px;color:#666;letter-spacing:1px;margin-top:1px}
    .hright{margin-left:auto;display:flex;align-items:center;gap:10px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* Mode toggle */
    .mode-toggle{
      display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;
    }
    .mode-btn{
      padding:5px 12px;font-size:11px;cursor:pointer;
      background:transparent;border:none;color:var(--muted);
      transition:all .2s;letter-spacing:.5px;
    }
    .mode-btn.active{background:var(--blue-dim);color:var(--blue)}
    .mode-btn:hover:not(.active){color:#aaa}

    /* ── CHAT AREA ── */
    #chat{
      flex:1;overflow-y:auto;padding:20px;
      display:flex;flex-direction:column;gap:14px;
      scroll-behavior:smooth;
    }
    #chat::-webkit-scrollbar{width:3px}
    #chat::-webkit-scrollbar-thumb{background:#222;border-radius:3px}

    .msg{display:flex;gap:10px;max-width:860px;animation:fadeUp .2s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{align-self:flex-end;flex-direction:row-reverse}
    .msg.jarvis{align-self:flex-start}

    .av{
      width:32px;height:32px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
    }
    .msg.user .av{background:#1e3a5f;color:var(--blue)}
    .msg.jarvis .av{background:radial-gradient(var(--blue),#0066cc);color:#fff;box-shadow:0 0 8px #00d4ff33}

    .mbody{display:flex;flex-direction:column;gap:4px;max-width:680px}
    .bubble{
      padding:11px 15px;border-radius:14px;
      line-height:1.7;font-size:14px;word-wrap:break-word;white-space:pre-wrap;
    }
    .msg.user .bubble{
      background:#1a3050;border:1px solid #00d4ff22;
      border-top-right-radius:3px;color:#cce;
    }
    .msg.jarvis .bubble{
      background:var(--bg3);border:1px solid var(--border);
      border-top-left-radius:3px;color:var(--text);
    }

    .mfooter{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
    .badge{
      display:inline-block;border-radius:4px;padding:1px 5px;
      font-size:9px;letter-spacing:.4px;
    }
    .badge.lang{background:#00d4ff18;color:var(--blue)}
    .badge.voice{background:#ff6b3520;color:var(--orange)}
    .badge.web{background:#00ff8820;color:var(--green)}
    .timing{font-size:9px;color:#333;margin-left:2px}

    /* Speak button */
    .spk{
      background:transparent;border:1px solid #ffffff0f;border-radius:5px;
      padding:2px 7px;cursor:pointer;font-size:9px;color:#444;
      display:inline-flex;align-items:center;gap:3px;transition:all .2s;
    }
    .spk:hover{border-color:var(--blue-mid);color:var(--blue)}
    .spk.playing{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
    .spk svg{width:10px;height:10px}

    /* Typing dots */
    .typing .bubble{display:flex;gap:5px;align-items:center;padding:14px 16px}
    .dt{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:bop 1.2s infinite}
    .dt:nth-child(2){animation-delay:.2s}.dt:nth-child(3){animation-delay:.4s}
    @keyframes bop{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-6px);opacity:1}}

    /* Welcome */
    .welcome{text-align:center;margin:auto;padding:40px 20px}
    .welcome h2{font-size:26px;color:var(--blue);letter-spacing:3px;margin-bottom:10px}
    .welcome p{font-size:13px;color:#444;line-height:1.9}
    .welcome em{color:#2a4a6a;font-style:normal}

    /* ── STATUS BAR (pipeline stages) ── */
    #status-bar{
      font-size:11px;color:#555;padding:3px 20px;
      display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:20px;
    }
    .stage{display:flex;align-items:center;gap:4px;transition:color .3s}
    .stage.done{color:var(--green)}.stage.active{color:var(--blue)}
    .stage .sicon{font-size:10px}
    .sep{color:#222}
    #conv-info{margin-left:auto;font-size:10px;color:#333}

    /* ── VOICE MODE PANEL ── */
    #voice-panel{
      display:none;
      flex-direction:column;align-items:center;justify-content:center;
      gap:20px;padding:30px;flex:1;
    }
    #voice-panel.active{display:flex}
    #chat.voice-mode{display:none}

    .voice-ring{
      position:relative;width:140px;height:140px;
      display:flex;align-items:center;justify-content:center;
    }
    .ring-bg{
      position:absolute;inset:0;border-radius:50%;
      border:2px solid var(--border);
    }
    .ring-pulse{
      position:absolute;inset:0;border-radius:50%;
      border:2px solid var(--blue);opacity:0;
      transition:opacity .3s;
    }
    .ring-pulse.active{animation:ring-anim 1.2s ease-out infinite}
    @keyframes ring-anim{
      0%{transform:scale(1);opacity:.6}
      100%{transform:scale(1.5);opacity:0}
    }
    #big-mic{
      width:90px;height:90px;border-radius:50%;
      background:radial-gradient(circle,#0d2a3a,#0a1520);
      border:2px solid #00d4ff33;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all .3s;z-index:1;
      box-shadow:0 0 20px #00d4ff11;
    }
    #big-mic:hover{border-color:var(--blue-mid);box-shadow:0 0 30px #00d4ff22}
    #big-mic.listening{border-color:var(--red);background:radial-gradient(circle,#2a0d0d,#1a0505);box-shadow:0 0 30px #ff3b1a33}
    #big-mic.processing{border-color:var(--orange);animation:spin-border 2s linear infinite}
    @keyframes spin-border{to{filter:hue-rotate(360deg)}}
    #big-mic svg{width:34px;height:34px}

    .vstate{font-size:13px;color:#555;letter-spacing:.5px;text-align:center}
    .vstate strong{color:var(--blue)}
    .vtranscript{
      font-size:13px;color:#888;font-style:italic;
      max-width:360px;text-align:center;line-height:1.6;
      min-height:20px;
    }
    .vreply{
      font-size:14px;color:var(--text);
      max-width:400px;text-align:center;line-height:1.7;
      min-height:20px;
    }
    .vbadges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}

    .vchat-link{
      font-size:11px;color:#333;text-decoration:none;
      border:1px solid #222;border-radius:6px;padding:4px 10px;
      cursor:pointer;transition:all .2s;
    }
    .vchat-link:hover{color:var(--blue);border-color:var(--blue-mid)}

    /* ── RECORDING STATUS ── */
    #rec-bar{
      display:none;font-size:11px;color:var(--orange);
      padding:2px 20px;flex-shrink:0;align-items:center;gap:6px;
    }
    #rec-bar.active{display:flex}
    .rdot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1s infinite}

    /* ── INPUT AREA ── */
    #input-area{
      background:var(--bg2);border-top:1px solid var(--border);
      padding:10px 14px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;
    }
    #new-chat-btn{
      background:transparent;border:1px solid var(--border);border-radius:9px;
      padding:0 11px;height:44px;color:var(--muted);font-size:11px;
      cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
    }
    #new-chat-btn:hover{border-color:var(--blue-mid);color:var(--blue)}
    #msg{
      flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:11px;
      padding:11px 14px;color:var(--text);font-size:14px;
      resize:none;outline:none;min-height:44px;max-height:130px;
      line-height:1.5;transition:border-color .2s;
    }
    #msg:focus{border-color:var(--blue-mid)}
    #msg::placeholder{color:#2a2a2a}
    .icon-btn{
      background:var(--bg3);border:1px solid var(--border);border-radius:11px;
      width:44px;height:44px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all .2s;flex-shrink:0;
    }
    .icon-btn:hover{border-color:var(--blue-mid)}
    .icon-btn:disabled{opacity:.3;cursor:not-allowed}
    .icon-btn.recording{border-color:var(--red);background:#1a0505;animation:mic-pulse 1s infinite}
    @keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 #ff3b1a33}50%{box-shadow:0 0 0 7px #ff3b1a00}}
    #send-btn{
      background:linear-gradient(135deg,var(--blue),#0066cc);
      border:none;border-radius:11px;width:44px;height:44px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:opacity .2s,transform .1s;flex-shrink:0;
    }
    #send-btn:hover{opacity:.85}
    #send-btn:active{transform:scale(.94)}
    #send-btn:disabled{opacity:.3;cursor:not-allowed}

    @media(max-width:520px){.bubble{max-width:88vw}#new-chat-btn{display:none}}
  </style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">J</div>
  <div>
    <div class="htitle">JARVIS</div>
    <div class="hsub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
  </div>
  <div class="hright">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-chat" onclick="setMode('chat')">Chat</button>
      <button class="mode-btn"        id="btn-voice" onclick="setMode('voice')">Voice</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#666">
      <div class="dot"></div><span>Online</span>
    </div>
  </div>
</header>

<!-- ── CHAT MODE ───────────────────────────────────────────────────────── -->
<div id="chat">
  <div class="welcome">
    <h2>JARVIS</h2>
    <p>Good day, Mr Aryan.<br>
       How may I assist you today?<br>
       <em>Type or speak — I support English, Hindi &amp; Hinglish.</em>
    </p>
  </div>
</div>

<!-- ── VOICE MODE ──────────────────────────────────────────────────────── -->
<div id="voice-panel">
  <div class="voice-ring">
    <div class="ring-bg"></div>
    <div class="ring-pulse" id="ring-pulse"></div>
    <button id="big-mic" onclick="toggleVoice()" title="Click to speak">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3" id="mic-rect"/>
        <path d="M5 10a7 7 0 0014 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8"  y1="22" x2="16" y2="22"/>
      </svg>
    </button>
  </div>

  <div class="vstate" id="vstate"><strong>Tap to speak</strong></div>
  <div class="vtranscript" id="vtranscript"></div>
  <div class="vreply"      id="vreply"></div>
  <div class="vbadges"     id="vbadges"></div>
  <div class="vchat-link"  onclick="setMode('chat')">📋 View full chat history</div>
</div>

<!-- ── STATUS BAR ─────────────────────────────────────────────────────── -->
<div id="status-bar">
  <span id="pipeline-stages"></span>
  <span id="conv-info"></span>
</div>

<!-- ── RECORDING BAR ──────────────────────────────────────────────────── -->
<div id="rec-bar">
  <div class="rdot"></div>
  <span id="rec-text">Recording…</span>
</div>

<!-- ── INPUT AREA ─────────────────────────────────────────────────────── -->
<div id="input-area">
  <button class="icon-btn" id="new-chat-btn" title="New conversation" onclick="newChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" width="18" height="18">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>
  <textarea id="msg" placeholder="Ask me anything, Mr Aryan…" rows="1"></textarea>
  <button class="icon-btn" id="mic-btn" title="Record voice" onclick="toggleRecording()">
    <svg viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
      <rect x="9" y="2" width="6" height="11" rx="3"/>
      <path d="M5 10a7 7 0 0014 0"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="8"  y1="22" x2="16" y2="22"/>
    </svg>
  </button>
  <button id="send-btn" title="Send" onclick="sendText()">
    <svg viewBox="0 0 24 24" fill="#fff" width="18" height="18">
      <path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/>
    </svg>
  </button>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════
let convId        = null;
let currentMode   = 'chat';   // 'chat' | 'voice'
let currentSpkBtn = null;
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;
let recTimer      = null;
let recSecs       = 0;

// Voice-mode state
let voiceRecording   = false;
let voiceProcessing  = false;

// ── Audio engine state ────────────────────────────────────────────
let _audioCtx    = null;   // Web AudioContext singleton
let _audioSrc    = null;   // Current AudioBufferSourceNode (AudioContext path)
let _audioEl     = null;   // Current HTMLAudioElement (fallback path)
let _audioLocked = true;   // true = browser hasn't unlocked autoplay yet

const $ = id => document.getElementById(id);

// ════════════════════════════════════════════════════════════════════
//  AUDIO ENGINE  — AudioContext primary, HTMLAudioElement fallback
//
//  Why AudioContext?
//    Once resumed via a user gesture it stays unlocked for the whole
//    session, including async callbacks. HTMLAudioElement.play() fails
//    silently on Chrome Mobile when the user-gesture chain has expired.
// ════════════════════════════════════════════════════════════════════

function _getCtx() {
  if (!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return _audioCtx;
}

/** Call inside any user-gesture handler to pre-unlock audio for the session. */
async function _unlockAudio() {
  try {
    const ctx = _getCtx();
    if (ctx.state === 'suspended') await ctx.resume();
    if (_audioLocked) {
      _audioLocked = false;
      _hideUnlockBanner();
    }
  } catch (_) {}
}

/** Stop whatever is currently playing and reset its button. */
function stopAudio() {
  // Stop AudioContext source
  if (_audioSrc) {
    try { _audioSrc.stop(); } catch (_) {}
    try { _audioSrc.disconnect(); } catch (_) {}
    _audioSrc = null;
  }
  // Stop HTMLAudioElement fallback
  if (_audioEl) {
    _audioEl.pause();
    _audioEl.src = '';
    _audioEl = null;
  }
  if (currentSpkBtn) {
    resetSpk(currentSpkBtn);
    currentSpkBtn = null;
  }
}

/**
 * Fetch TTS audio and play it.
 *
 * Strategy:
 *  1. Fetch full MP3 buffer (stream:false — simpler, same effective latency
 *     because we need the full buffer for decodeAudioData anyway).
 *  2. Try AudioContext.decodeAudioData → most reliable, bypasses autoplay.
 *  3. Fall back to HTMLAudioElement.play() with proper Promise handling.
 *  4. If autoplay is still blocked, show the unlock banner.
 */
async function speakText(text, lang, voice, btn) {
  if (!text || !text.trim()) return;

  // Toggle off if already playing this button
  if (btn && btn.classList.contains('playing')) { stopAudio(); return; }

  stopAudio();

  if (btn) { btn.classList.add('playing'); btn.innerHTML = pauseIcon() + ' Stop'; }
  currentSpkBtn = btn;

  try {
    // Attempt to resume AudioContext (no-op if already running)
    await _unlockAudio();

    // ── Fetch audio ────────────────────────────────────────────
    const res = await fetch('/tts/speak', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({
        text,
        language: lang  || 'english',
        voice:    voice || undefined,
        stream:   false,   // full buffer — needed for decodeAudioData
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const arrayBuffer = await res.arrayBuffer();
    if (!arrayBuffer || arrayBuffer.byteLength === 0) {
      throw new Error('Empty audio response from TTS.');
    }

    // ── Play via AudioContext (primary) ────────────────────────
    let playedViaCtx = false;
    try {
      const ctx = _getCtx();
      if (ctx.state === 'suspended') await ctx.resume();

      // decodeAudioData requires a detached buffer copy
      const decoded = await ctx.decodeAudioData(arrayBuffer.slice(0));

      const src = ctx.createBufferSource();
      src.buffer = decoded;
      src.connect(ctx.destination);
      _audioSrc = src;

      src.onended = () => {
        _audioSrc = null;
        resetSpk(btn);
        currentSpkBtn = null;
      };

      src.start(0);
      playedViaCtx = true;

    } catch (ctxErr) {
      console.warn('AudioContext playback failed, trying HTMLAudioElement:', ctxErr);
    }

    // ── Fallback: HTMLAudioElement ─────────────────────────────
    if (!playedViaCtx) {
      const blob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
      const url  = URL.createObjectURL(blob);
      const aud  = new Audio(url);
      aud.preload = 'auto';
      _audioEl = aud;

      const onDone = () => {
        URL.revokeObjectURL(url);
        _audioEl = null;
        resetSpk(btn);
        currentSpkBtn = null;
      };
      aud.onended = onDone;
      aud.onerror = onDone;

      try {
        await aud.play();
      } catch (playErr) {
        onDone();
        if (playErr.name === 'NotAllowedError') {
          // Autoplay truly blocked — show the unlock banner
          _showUnlockBanner(() => speakText(text, lang, voice, btn));
        } else {
          throw playErr;
        }
        return;
      }
    }

  } catch (e) {
    console.error('TTS error:', e);
    resetSpk(btn);
    currentSpkBtn = null;
  }
}

// ── Autoplay unlock banner ────────────────────────────────────────
let _pendingAfterUnlock = null;

function _showUnlockBanner(retryFn) {
  _pendingAfterUnlock = retryFn;
  let banner = $('audio-unlock-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'audio-unlock-banner';
    banner.innerHTML = `
      <span>🔇 Audio blocked by browser</span>
      <button onclick="_userUnlockAndRetry()" style="
        margin-left:10px;padding:3px 10px;border-radius:5px;
        background:var(--blue);border:none;color:#000;
        font-size:11px;font-weight:700;cursor:pointer;">
        Tap to enable audio
      </button>`;
    Object.assign(banner.style, {
      position:'fixed', bottom:'70px', left:'50%', transform:'translateX(-50%)',
      background:'#1a1a2e', border:'1px solid var(--blue-mid)',
      borderRadius:'8px', padding:'8px 14px', fontSize:'12px',
      color:'var(--blue)', zIndex:'999', display:'flex',
      alignItems:'center', boxShadow:'0 4px 20px #00d4ff22',
      animation:'fadeUp .3s ease',
    });
    document.body.appendChild(banner);
  }
  banner.style.display = 'flex';
}

function _hideUnlockBanner() {
  const b = $('audio-unlock-banner');
  if (b) b.style.display = 'none';
}

async function _userUnlockAndRetry() {
  await _unlockAudio();
  if (_pendingAfterUnlock) {
    const fn = _pendingAfterUnlock;
    _pendingAfterUnlock = null;
    fn();
  }
}

// Pre-unlock AudioContext on any user interaction with the page
document.addEventListener('click',    () => _unlockAudio(), { passive: true });
document.addEventListener('touchend', () => _unlockAudio(), { passive: true });
document.addEventListener('keydown',  () => _unlockAudio(), { passive: true });

// ════════════════════════════════════════════════════════════════════
//  MODE SWITCHING
// ════════════════════════════════════════════════════════════════════
function setMode(mode) {
  currentMode = mode;
  $('btn-chat').classList.toggle('active',  mode === 'chat');
  $('btn-voice').classList.toggle('active', mode === 'voice');
  $('chat').classList.toggle('voice-mode',  mode === 'voice');
  $('voice-panel').classList.toggle('active', mode === 'voice');

  if (mode === 'voice' && !voiceRecording && !voiceProcessing) {
    setVoiceState('idle');
  }
}

// ════════════════════════════════════════════════════════════════════
//  PIPELINE STATUS BAR
// ════════════════════════════════════════════════════════════════════
const STAGES = [
  {key:'stt',    label:'STT'},
  {key:'memory', label:'Memory'},
  {key:'llm',    label:'AI'},
  {key:'done',   label:'Done'},
];

function showStages(activeKey) {
  const el = $('pipeline-stages');
  if (!activeKey) { el.innerHTML = ''; return; }
  el.innerHTML = STAGES.map((s, i) => {
    let cls = '';
    const idx = STAGES.findIndex(x => x.key === activeKey);
    if (i < idx)  cls = 'done';
    if (i === idx) cls = 'active';
    return `<span class="stage ${cls}">
      ${cls === 'done' ? '✓' : (cls === 'active' ? '◉' : '○')} ${s.label}
    </span>${i < STAGES.length - 1 ? '<span class="sep">›</span>' : ''}`;
  }).join('');
}

function clearStages() { $('pipeline-stages').innerHTML = ''; }

function setConvInfo(data) {
  convId = data.conversation_id;
  const t = data.timing_ms || {};
  const total = t.total_ms || 0;
  $('conv-info').textContent =
    `Conv:${convId.slice(0,6)}… | ${data.message_count} msgs | ${total}ms`;
}

// ════════════════════════════════════════════════════════════════════
//  CHAT: APPEND MESSAGES
// ════════════════════════════════════════════════════════════════════
function appendMsg(role, text, opts = {}) {
  const welcome = $('chat').querySelector('.welcome');
  if (welcome) welcome.remove();

  const wrap   = document.createElement('div');
  wrap.className = `msg ${role}`;

  const av  = document.createElement('div');
  av.className = 'av';
  av.textContent = role === 'user' ? 'MA' : 'J';

  const body   = document.createElement('div');
  body.className = 'mbody';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  body.appendChild(bubble);

  if (role === 'jarvis' || opts.badges) {
    const footer = document.createElement('div');
    footer.className = 'mfooter';
    if (opts.badges) footer.innerHTML = opts.badges;
    if (role === 'jarvis') {
      footer.appendChild(buildSpkBtn(text, opts.ttsLang || 'english', opts.ttsVoice));
    }
    body.appendChild(footer);
  }

  wrap.appendChild(av);
  wrap.appendChild(body);
  $('chat').appendChild(wrap);
  $('chat').scrollTop = $('chat').scrollHeight;
  return bubble;
}

function showTyping() {
  const w = $('chat').querySelector('.welcome');
  if (w) w.remove();
  const d = document.createElement('div');
  d.className = 'msg jarvis typing'; d.id = 'typing-ind';
  const av  = document.createElement('div'); av.className  = 'av'; av.textContent = 'J';
  const bub = document.createElement('div'); bub.className = 'bubble';
  bub.innerHTML = '<div class="dt"></div><div class="dt"></div><div class="dt"></div>';
  d.appendChild(av); d.appendChild(bub);
  $('chat').appendChild(d);
  $('chat').scrollTop = $('chat').scrollHeight;
}
function hideTyping() {
  const t = $('typing-ind');
  if (t) t.remove();
}

function badgeHTML(data, isVoice = false) {
  let b = '';
  if (isVoice) b += `<span class="badge voice">🎤 VOICE</span> `;
  if (data.used_web_search) b += `<span class="badge web">🔍 WEB</span> `;
  const lang = (data.transcript_language || data.language || 'en').toUpperCase();
  b += `<span class="badge lang">${lang}</span>`;
  const t = data.timing_ms || {};
  if (t.total_ms) b += `<span class="timing">${t.total_ms}ms</span>`;
  return b;
}

// ════════════════════════════════════════════════════════════════════
//  TTS: SPEAK BUTTON
// ════════════════════════════════════════════════════════════════════
function buildSpkBtn(text, lang, voice) {
  const btn = document.createElement('button');
  btn.className = 'spk';
  btn.innerHTML = spkIcon() + ' Speak';
  btn.onclick   = () => speakText(text, lang, voice, btn);
  return btn;
}
function spkIcon() {
  return `<svg viewBox="0 0 24 24" fill="currentColor">
    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05
             c1.48-.73 2.5-2.25 2.5-4.02z"/>
  </svg>`;
}
function pauseIcon() {
  return `<svg viewBox="0 0 24 24" fill="currentColor">
    <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
  </svg>`;
}

function resetSpk(btn) {
  if (!btn) return;
  btn.classList.remove('playing');
  btn.innerHTML = spkIcon() + ' Speak';
}

// ════════════════════════════════════════════════════════════════════
//  BUSY STATE
// ════════════════════════════════════════════════════════════════════
function setBusy(busy) {
  $('send-btn').disabled  = busy;
  $('mic-btn').disabled   = busy;
  $('msg').disabled       = busy;
}

// ════════════════════════════════════════════════════════════════════
//  NEW CHAT
// ════════════════════════════════════════════════════════════════════
function newChat() {
  stopAudio();
  convId = null;
  $('chat').innerHTML = `<div class="welcome"><h2>JARVIS</h2>
    <p>Good day, Mr Aryan.<br>How may I assist you today?<br>
    <em>Type or speak — English, Hindi &amp; Hinglish supported.</em></p></div>`;
  $('conv-info').textContent = '';
  clearStages();
  $('msg').focus();

  // Reset voice panel
  setVoiceState('idle');
  $('vtranscript').textContent = '';
  $('vreply').textContent      = '';
  $('vbadges').innerHTML       = '';
}

// ════════════════════════════════════════════════════════════════════
//  TEXT AUTO-RESIZE
// ════════════════════════════════════════════════════════════════════
$('msg').addEventListener('input', () => {
  $('msg').style.height = 'auto';
  $('msg').style.height = Math.min($('msg').scrollHeight, 130) + 'px';
});
$('msg').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});

// ════════════════════════════════════════════════════════════════════
//  SEND TEXT (uses /conversation/text pipeline)
// ════════════════════════════════════════════════════════════════════
async function sendText() {
  const text = $('msg').value.trim();
  if (!text) return;

  $('msg').value = '';
  $('msg').style.height = 'auto';
  setBusy(true);
  appendMsg('user', text);
  showTyping();
  showStages('stt');   // immediately shows progress (no STT but signals activity)

  try {
    showStages('memory');
    const res  = await fetch('/conversation/text', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, conversation_id: convId}),
    });
    const data = await res.json();
    hideTyping();

    if (!res.ok) {
      appendMsg('jarvis', '⚠ ' + (data.detail || 'Something went wrong.'));
      clearStages(); return;
    }

    showStages('done');
    setConvInfo(data);
    appendMsg('jarvis', data.reply, {
      badges:   badgeHTML(data),
      ttsLang:  data.tts_language || 'english',
      ttsVoice: data.tts_voice,
    });
    clearStages();

  } catch(e) {
    hideTyping(); clearStages();
    appendMsg('jarvis', '⚠ Could not reach JARVIS.');
  } finally {
    setBusy(false);
    $('msg').focus();
  }
}

// ════════════════════════════════════════════════════════════════════
//  CHAT-MODE MIC RECORDING
// ════════════════════════════════════════════════════════════════════
async function toggleRecording() {
  if (isRecording) stopRecording();
  else             await startRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    audioChunks  = [];
    const mime   = ['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4']
                    .find(m => MediaRecorder.isTypeSupported(m)) || '';
    mediaRecorder = new MediaRecorder(stream, mime ? {mimeType: mime} : {});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); sendAudio(); };
    mediaRecorder.start(200);
    isRecording = true; recSecs = 0;

    $('mic-btn').classList.add('recording');
    $('rec-bar').classList.add('active');
    recTimer = setInterval(() => {
      recSecs++;
      $('rec-text').textContent = `Recording… ${recSecs}s  ·  tap mic to stop`;
    }, 1000);
    setTimeout(stopRecording, 60000);
  } catch(e) {
    alert('Microphone access denied.');
  }
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  clearInterval(recTimer); isRecording = false;
  mediaRecorder.stop();
  $('mic-btn').classList.remove('recording');
  $('rec-bar').classList.remove('active');
  $('rec-text').textContent = 'Recording…';
}

async function sendAudio(blobOverride) {
  const chunks   = blobOverride ? null : audioChunks;
  const mime     = mediaRecorder?.mimeType || 'audio/webm';
  const blob     = blobOverride || new Blob(chunks, {type: mime});
  if (blob.size < 100) return;

  const userBubble = appendMsg('user', '🎤 Voice message…');
  showTyping();
  setBusy(true);
  showStages('stt');

  const form = new FormData();
  const ext  = mime.includes('ogg') ? 'ogg' : mime.includes('mp4') ? 'mp4' : 'webm';
  form.append('file', blob, `rec.${ext}`);
  if (convId) form.append('conversation_id', convId);

  try {
    // Stage annotations
    showStages('stt');
    const res  = await fetch('/conversation/voice', {method: 'POST', body: form});
    const data = await res.json();
    hideTyping();

    if (!res.ok) {
      userBubble.textContent = '⚠ ' + (data.detail || 'Pipeline failed.');
      clearStages(); return;
    }

    showStages('done');
    // Update user bubble with real transcript
    userBubble.textContent = `🎤 "${data.transcript}"`;
    // Add badges to user message footer
    const userMsgBody = userBubble.closest('.mbody');
    const uf = document.createElement('div'); uf.className = 'mfooter';
    uf.innerHTML = `<span class="badge voice">VOICE</span>
      <span class="badge lang">${(data.transcript_language || 'hi').toUpperCase()}</span>
      ${data.audio_duration ? `<span class="timing">${data.audio_duration.toFixed(1)}s audio</span>` : ''}`;
    userMsgBody.appendChild(uf);

    setConvInfo(data);
    appendMsg('jarvis', data.reply, {
      badges:   badgeHTML(data, true),
      ttsLang:  data.tts_language || 'english',
      ttsVoice: data.tts_voice,
    });

    // Auto-play TTS for the reply
    await speakText(data.reply, data.tts_language, data.tts_voice, null);
    clearStages();

  } catch(e) {
    hideTyping(); clearStages();
    userBubble.textContent = '⚠ Voice pipeline failed.';
  } finally {
    setBusy(false); audioChunks = [];
  }
}

// ════════════════════════════════════════════════════════════════════
//  VOICE MODE — big mic button
// ════════════════════════════════════════════════════════════════════
function setVoiceState(state) {
  const mic  = $('big-mic');
  const ring = $('ring-pulse');
  const vs   = $('vstate');

  mic.classList.remove('listening','processing');
  ring.classList.remove('active');

  if (state === 'idle') {
    vs.innerHTML = '<strong>Tap to speak</strong>';
    mic.querySelector('svg').style.color = '#00d4ff88';
  } else if (state === 'listening') {
    mic.classList.add('listening');
    ring.classList.add('active');
    vs.innerHTML = '<strong style="color:var(--red)">Listening…</strong>';
    mic.querySelector('svg').style.color = '#ff3b1a';
  } else if (state === 'processing') {
    mic.classList.add('processing');
    vs.innerHTML = '<strong style="color:var(--orange)">Processing…</strong>';
    mic.querySelector('svg').style.color = '#ff8c55';
  } else if (state === 'speaking') {
    vs.innerHTML = '<strong style="color:var(--blue)">Speaking…</strong>';
  }
}

let vMediaRecorder = null;
let vAudioChunks   = [];
let vRecTimer      = null;

async function toggleVoice() {
  if (voiceProcessing) return;

  if (voiceRecording) {
    // Stop recording → process
    clearTimeout(vRecTimer);
    voiceRecording = false;
    vMediaRecorder.stop();
    setVoiceState('processing');
    voiceProcessing = true;
  } else {
    // Start recording
    try {
      const stream  = await navigator.mediaDevices.getUserMedia({audio: true});
      vAudioChunks  = [];
      const mime    = ['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4']
                       .find(m => MediaRecorder.isTypeSupported(m)) || '';
      vMediaRecorder = new MediaRecorder(stream, mime ? {mimeType: mime} : {});
      vMediaRecorder.ondataavailable = e => { if (e.data.size > 0) vAudioChunks.push(e.data); };
      vMediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        await processVoiceMode();
      };
      vMediaRecorder.start(200);
      voiceRecording = true;
      setVoiceState('listening');
      $('vtranscript').textContent = '';
      $('vreply').textContent = '';
      $('vbadges').innerHTML  = '';

      // Auto-stop after 60s
      vRecTimer = setTimeout(() => {
        if (voiceRecording) { voiceRecording = false; vMediaRecorder.stop(); setVoiceState('processing'); voiceProcessing = true; }
      }, 60000);

    } catch(e) {
      alert('Microphone access denied. Please allow microphone and try again.');
    }
  }
}

async function processVoiceMode() {
  const mime = vMediaRecorder?.mimeType || 'audio/webm';
  const blob = new Blob(vAudioChunks, {type: mime});
  if (blob.size < 100) {
    setVoiceState('idle'); voiceProcessing = false; return;
  }

  const form = new FormData();
  const ext  = mime.includes('ogg') ? 'ogg' : mime.includes('mp4') ? 'mp4' : 'webm';
  form.append('file', blob, `vrec.${ext}`);
  if (convId) form.append('conversation_id', convId);

  setVoiceState('processing');
  $('vstate').innerHTML = '<strong style="color:var(--orange)">Transcribing…</strong>';

  try {
    const res  = await fetch('/conversation/voice', {method: 'POST', body: form});
    const data = await res.json();

    if (!res.ok) {
      $('vstate').innerHTML = `<strong style="color:var(--red)">⚠ ${data.detail || 'Error'}</strong>`;
      setTimeout(() => setVoiceState('idle'), 3000);
      voiceProcessing = false; return;
    }

    // Show transcript
    $('vtranscript').textContent = `"${data.transcript}"`;
    $('vstate').innerHTML = '<strong style="color:var(--blue)">Speaking…</strong>';
    $('vreply').textContent = data.reply;

    // Build badges
    let badges = '';
    if (data.used_web_search) badges += `<span class="badge web">🔍 WEB</span>`;
    badges += `<span class="badge lang">${(data.transcript_language || 'en').toUpperCase()}</span>`;
    if (data.timing_ms?.total_ms) badges += `<span class="timing">${data.timing_ms.total_ms}ms</span>`;
    $('vbadges').innerHTML = badges;

    setConvInfo(data);

    // Also append to chat history silently
    appendToHistoryOnly(data.transcript, data.reply, data);

    // Play TTS
    setVoiceState('speaking');
    await speakText(data.reply, data.tts_language, data.tts_voice, null);
    setVoiceState('idle');
    $('vstate').innerHTML = '<strong>Tap to speak</strong>';

  } catch(e) {
    console.error('Voice mode error:', e);
    $('vstate').innerHTML = '<strong style="color:var(--red)">Connection error</strong>';
    setTimeout(() => setVoiceState('idle'), 3000);
  } finally {
    voiceProcessing = false;
    vAudioChunks    = [];
  }
}

// Append turn to chat history without switching mode
function appendToHistoryOnly(userText, replyText, data) {
  const welcome = $('chat').querySelector('.welcome');
  if (welcome) welcome.remove();

  // User bubble
  const uw = document.createElement('div'); uw.className = 'msg user';
  const ua = document.createElement('div'); ua.className = 'av'; ua.textContent = 'MA';
  const ub = document.createElement('div'); ub.className = 'mbody';
  const ubb = document.createElement('div'); ubb.className = 'bubble';
  ubb.textContent = `🎤 "${userText}"`; ub.appendChild(ubb); uw.appendChild(ua); uw.appendChild(ub);
  $('chat').appendChild(uw);

  // JARVIS bubble
  const jw = document.createElement('div'); jw.className = 'msg jarvis';
  const ja = document.createElement('div'); ja.className = 'av'; ja.textContent = 'J';
  const jb = document.createElement('div'); jb.className = 'mbody';
  const jbb = document.createElement('div'); jbb.className = 'bubble'; jbb.textContent = replyText;
  const jf = document.createElement('div'); jf.className = 'mfooter';
  jf.innerHTML = badgeHTML(data, true);
  jf.appendChild(buildSpkBtn(replyText, data.tts_language, data.tts_voice));
  jb.appendChild(jbb); jb.appendChild(jf);
  jw.appendChild(ja); jw.appendChild(jb);
  $('chat').appendChild(jw);
  $('chat').scrollTop = $('chat').scrollHeight;
}
</script>
